services:
  - type: web
    name: pharmastream-backend
    env: python
    rootContext: backend
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput --clear
    startCommand: gunicorn config.wsgi:application --workers 4 --timeout 120
    healthCheckPath: /api/health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: pharmastream-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: pharmastream-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://pharmastream-frontend.onrender.com
      - key: SECURE_SSL_REDIRECT
        value: true
      - key: SESSION_COOKIE_SECURE
        value: true
      - key: CSRF_COOKIE_SECURE
        value: true

  - type: web
    name: pharmastream-frontend
    env: static
    rootContext: frontend
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: '/*'
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://pharmastream-backend.onrender.com

databases:
  - name: pharmastream-db
    plan: free
    region: oregon
    databaseName: pharmastream
    user: pharmastream_user

