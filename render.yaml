services:
  - type: web
    name: pharmastream-backend
    env: docker
    dockerFilePath: backend/Dockerfile
    dockerContext: .
    region: oregon
    plan: free
    healthCheckPath: /api/health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: pharmastream-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: pharmastream-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://pharmastream-frontend.onrender.com
      - key: SECURE_SSL_REDIRECT
        value: true
      - key: SESSION_COOKIE_SECURE
        value: true
      - key: CSRF_COOKIE_SECURE
        value: true

  - type: web
    name: pharmastream-frontend
    env: docker
    dockerFilePath: frontend/Dockerfile
    dockerContext: .
    region: oregon
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://pharmastream-backend.onrender.com/api

databases:
  - name: pharmastream-db
    plan: free
    region: oregon
    databaseName: pharmastream
    user: pharmastream_user

